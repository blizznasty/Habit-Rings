<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Habit Rings</title>

<style>
body{
font-family: Georgia, serif;
background:#f8f5f1;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
gap:40px;
flex-wrap:wrap;
}

.habit{
text-align:center;
}

.title{
font-size:18px;
letter-spacing:2px;
margin-bottom:15px;
color:#7b6858;
}

.circle{
width:140px;
height:140px;
border-radius:50%;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
background:
conic-gradient(#8a9b82 0deg,#e8e2dc 0deg);
transition:.3s;
}

.tooltip{
margin-top:10px;
font-size:14px;
color:#8b7d71;
opacity:0;
transition:.3s;
}

.habit:hover .tooltip{
opacity:1;
}
</style>
</head>

<body>

<div class="habit">
<div class="title">WATER</div>
<div class="circle" id="water">💧</div>
<div class="tooltip">0 / 120 oz</div>
</div>

</body>
</html>
