<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cozy Habit Rings v2</title>
<style>
body{
margin:0;
padding:20px;
font-family:Georgia, serif;
background:#f8f5f1;
color:#6f6257;
overflow-x:hidden;
}
.top{
display:flex;
justify-content:center;
margin-bottom:18px;
}
button{
border:none;
border-radius:999px;
padding:10px 18px;
cursor:pointer;
background:#d8cfc5;
color:#5f544b;
font-weight:bold;
font-family:Georgia, serif;
transition:.25s;
}
button:hover{transform:translateY(-2px);}
.grid{
display:flex;
justify-content:center;
align-items:flex-start;
gap:14px;
flex-wrap:nowrap;
overflow-x:auto;
padding-bottom:10px;
}
.card{
text-align:center;
transition:.25s;
flex-shrink:0;
}
.card:hover{transform:translateY(-4px);}
.label{
letter-spacing:1.5px;
font-size:12px;
margin-bottom:8px;
color:#7b6858;
}
.ring{
width:110px;
height:110px;
border-radius:50%;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
font-weight:bold;
cursor:pointer;
transition:.25s;
}
.tip{
opacity:0;
font-size:11px;
margin-top:6px;
transition:.25s;
color:#8b7d71;
}
.card:hover .tip{opacity:1;}
.inner{
width:84px;
height:84px;
border-radius:50%;
background:#f8f5f1;
display:flex;
align-items:center;
justify-content:center;
}
</style>
</head>
<body>
<div class="top">
<button onclick="resetAll()">↺ NEW DAY</button>
</div>
<div class="grid" id="grid"></div>
<script>
const habits=[
{name:"WATER",goal:120,step:40,color:"#8a9b82",unit:"oz"},
{name:"PROTEIN",goal:130,step:10,color:"#c99aa3",unit:"g"},
{name:"CALORIES",goal:1550,step:100,color:"#c78b61",unit:"cal"},
{name:"STEPS",goal:10000,step:1000,color:"#8b9771",unit:"steps"},
{name:"WORKOUT",goal:45,step:5,color:"#a99886",unit:"min"},
{name:"SELF CARE",goal:60,step:15,color:"#d8aeb6",unit:"min"},
{name:"HOME",goal:100,step:10,color:"#9b7f68",unit:"%"}
];
let data=JSON.parse(localStorage.getItem("cozyHabits")||"{}");
function save(){localStorage.setItem("cozyHabits",JSON.stringify(data));}
function draw(){
const grid=document.getElementById("grid");
grid.innerHTML="";
habits.forEach(h=>{
const val=data[h.name]||0;
const pct=Math.min(100,Math.round((val/h.goal)*100));
const center=pct>=100 ? "✓" : pct;
const glow=pct>=100 ? `0 0 18px ${h.color}` : "none";
const card=document.createElement("div");
card.className="card";
card.innerHTML=`
<div class="label">${h.name}</div>
<div class="ring" onclick="inc('${h.name}')" style="background:conic-gradient(${h.color} ${pct}%,#e8e2dc ${pct}%);box-shadow:${glow};">
<div class="inner">${center}</div>
</div>
<div class="tip">${val} / ${h.goal} ${h.unit}<br>${pct}%</div>`;
grid.appendChild(card);
});
}
function inc(name){
const h=habits.find(x=>x.name===name);
data[name]=Math.min(h.goal,(data[name]||0)+h.step);
save();draw();
}
function resetAll(){
data={};
save();
draw();
}
draw();
</script>
</body>
</html>
