<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cozy Habit Rings</title>
<style>
body{
  margin:0;padding:24px;
  font-family: Georgia, serif;
  background:#f8f5f1;color:#6f6257;
}
.top{display:flex;justify-content:center;margin-bottom:24px}
button{
  border:none;border-radius:999px;padding:10px 18px;cursor:pointer;
  background:#d8cfc5;color:#5f544b;font-weight:bold;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:24px;
  max-width:1200px;
  margin:auto;
}
.card{text-align:center}
.label{letter-spacing:2px;font-size:14px;margin-bottom:10px}
.ring{
  width:140px;height:140px;border-radius:50%;
  margin:auto;display:flex;align-items:center;justify-content:center;
  font-size:34px;font-weight:bold;cursor:pointer;
}
.tip{opacity:0;font-size:12px;margin-top:8px;transition:.2s}
.card:hover .tip{opacity:1}
</style>
</head>
<body>
<div class="top"><button onclick="resetAll()">↺ NEW DAY</button></div>
<div class="grid" id="grid"></div>

<script>
const habits=[
{name:"WATER",emoji:"💧",goal:120,step:40,color:"#8a9b82",unit:"oz"},
{name:"PROTEIN",emoji:"🍗",goal:130,step:10,color:"#c99aa3",unit:"g"},
{name:"CALORIES",emoji:"🔥",goal:1550,step:100,color:"#c78b61",unit:"cal"},
{name:"STEPS",emoji:"👣",goal:10000,step:1000,color:"#8b9771",unit:"steps"},
{name:"WORKOUT",emoji:"💪",goal:45,step:5,color:"#a99886",unit:"min"},
{name:"SELF CARE",emoji:"✨",goal:60,step:15,color:"#d8aeb6",unit:"min"},
{name:"HOME RESET",emoji:"🏠",goal:100,step:10,color:"#9b7f68",unit:"%"}
];

let data=JSON.parse(localStorage.getItem("cozyHabits")||"{}");

function save(){localStorage.setItem("cozyHabits",JSON.stringify(data));}

function draw(){
 const grid=document.getElementById("grid");
 grid.innerHTML="";
 habits.forEach(h=>{
   const val=data[h.name]||0;
   const pct=Math.min(100,Math.round(val/h.goal*100));
   const center=pct>=100 ? "✓" : pct;
   const card=document.createElement("div");
   card.className="card";
   card.innerHTML=`
   <div class="label">${h.name}</div>
   <div class="ring" onclick="inc('${h.name}')"
   style="background:conic-gradient(${h.color} ${pct}%, #e8e2dc ${pct}%);">
      <div style="width:108px;height:108px;border-radius:50%;background:#f8f5f1;display:flex;align-items:center;justify-content:center;">
      ${center}
      </div>
   </div>
   <div class="tip">${val} / ${h.goal} ${h.unit}<br>${pct}%</div>`;
   grid.appendChild(card);
 });
}

function inc(name){
 const h=habits.find(x=>x.name===name);
 data[name]=Math.min(h.goal,(data[name]||0)+h.step);
 save(); draw();
}

function resetAll(){
 if(confirm("Start a new day?")){
   data={}; save(); draw();
 }
}

draw();
</script>
</body>
</html>
